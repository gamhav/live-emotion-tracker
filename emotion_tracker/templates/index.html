<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emotion Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0e;
      --surface:  #111118;
      --border:   #1e1e2e;
      --text:     #e0e0ee;
      --muted:    #50506a;
      --accent:   #7cf5c0;
      --mono:     'Share Tech Mono', monospace;
      --sans:     'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 860px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .logo {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .logo span { color: var(--accent); }
    .live-badge {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--mono); font-size: 0.7rem;
      color: var(--muted); letter-spacing: 0.1em;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.7); }
    }

    /* ── Main layout ── */
    .main {
      width: 100%;
      max-width: 860px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
    }

    /* ── Camera card ── */
    .camera-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .camera-card img {
      width: 100%;
      display: block;
      aspect-ratio: 4/3;
      object-fit: cover;
      filter: saturate(0.85);
    }
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 3s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0%   { top: 0;    opacity: 0.9; }
      50%  { opacity: 0.5; }
      100% { top: 100%; opacity: 0.9; }
    }

    /* ── Sidebar ── */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── Emotion display ── */
    .emotion-name {
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
      transition: color 0.4s;
      font-family: var(--mono);
    }
    .confidence {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Bar chart ── */
    .bar-list { display: flex; flex-direction: column; gap: 9px; }
    .bar-row { display: flex; flex-direction: column; gap: 4px; }
    .bar-meta {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
    }
    .bar-track {
      height: 5px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* ── Log ── */
    .log-list {
      max-height: 140px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .log-list::-webkit-scrollbar { width: 3px; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .log-item {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 5px;
    }
    .log-item .emo { color: var(--text); }

    @media (max-width: 640px) {
      .main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">[ <span>VAI</span> ] &nbsp; Emotion Tracker v1.0</div>
  <div class="live-badge"><div class="dot"></div> LIVE FEED</div>
</header>

<div class="main">

  <!-- Camera -->
  <div class="camera-card">
    <img id="videoFeed" src="/video_feed" alt="Live Feed" />
    <div class="scan-line"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Current Emotion -->
    <div class="card">
      <div class="card-label">Detected Emotion</div>
      <div class="emotion-name" id="emotionName">—</div>
      <div class="confidence" id="confText">confidence: —</div>
    </div>

    <!-- Bar chart -->
    <div class="card">
      <div class="card-label">Emotion Breakdown</div>
      <div class="bar-list" id="barList"></div>
    </div>

    <!-- Log -->
    <div class="card">
      <div class="card-label">Session Log</div>
      <div class="log-list" id="logList">
        <div class="log-item"><span>—</span><span>waiting...</span></div>
      </div>
    </div>

  </div>
</div>

<script>
  const COLORS = {
    Happy:     "#7cf5c0",
    Sad:       "#6ea6f5",
    Angry:     "#f56e6e",
    Surprised: "#f5d76e",
    Neutral:   "#9090a0",
    Fearful:   "#c46ef5",
    Disgusted: "#6ef5a0",
  };

  const EMOTIONS = ["Happy","Sad","Angry","Surprised","Neutral","Fearful","Disgusted"];
  let lastEmotion = null;
  const log = [];

  // Build bar rows
  const barList = document.getElementById("barList");
  EMOTIONS.forEach(e => {
    const row = document.createElement("div");
    row.className = "bar-row";
    row.innerHTML = `
      <div class="bar-meta">
        <span>${e}</span>
        <span id="pct-${e}">0%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-${e}" style="width:0%;background:${COLORS[e]}"></div>
      </div>`;
    barList.appendChild(row);
  });

  async function poll() {
    try {
      const res  = await fetch("/emotion_data");
      const data = await res.json();
      const { label, confidence, scores } = data;

      // Update name
      const nameEl = document.getElementById("emotionName");
      nameEl.textContent = label || "—";
      nameEl.style.color = COLORS[label] || "var(--accent)";
      document.getElementById("confText").textContent =
        label && label !== "Scanning..." ? `confidence: ${confidence?.toFixed(0)}%` : "confidence: —";

      // Update bars
      if (scores) {
        EMOTIONS.forEach(e => {
          const v = scores[e] ?? 0;
          document.getElementById(`bar-${e}`).style.width = v + "%";
          document.getElementById(`pct-${e}`).textContent  = v.toFixed(0) + "%";
        });
      }

      // Log change
      if (label && label !== "Scanning..." && label !== lastEmotion) {
        lastEmotion = label;
        const t = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit", second:"2-digit"});
        log.unshift({ time: t, emotion: label });
        if (log.length > 30) log.pop();
        renderLog();
      }
    } catch(_) {}
  }

  function renderLog() {
    const el = document.getElementById("logList");
    el.innerHTML = log.map(l =>
      `<div class="log-item">
         <span class="emo">${l.emotion}</span>
         <span>${l.time}</span>
       </div>`
    ).join("") || `<div class="log-item"><span>—</span><span>waiting...</span></div>`;
  }

  setInterval(poll, 800);
  poll();
</script>
</body>
</html>
